    const introListEl = document.getElementById('introList');
    const jsListEl = document.getElementById('jsList');
    const reactListEl = document.getElementById('reactList');

    const groupColors = ['blue', 'orange', 'green', 'purple', 'pink'];

    function formatInline(text) {
      return text
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    }

    function createCardEl(item, color) {
      const wrapper = document.createElement('div');
      wrapper.className = 'faq-item card';
      wrapper.style.setProperty('--card-color', `var(--accent-${color})`);

      const button = document.createElement('button');
      button.className = 'faq-question';
      button.type = 'button';
      button.innerHTML = `<span class="dot" style="background:var(--accent-${color})"></span><span class="q-text">${item.question}</span><span class="icon" title="Answers">+</span>`;

      const answer = document.createElement('div');
      answer.className = 'faq-answer';
      answer.innerHTML = item.answer
        .split('\n\n')
        .map(p => `<p>${formatInline(p).replace(/\n/g, '<br>')}</p>`)
        .join('');

      button.addEventListener('click', () => wrapper.classList.toggle('active'));

      wrapper.appendChild(button);
      wrapper.appendChild(answer);
      return wrapper;
    }

    function renderGrouped(containerEl, items) {
      const groups = [];
      items.forEach(item => {
        let group = groups.find(g => g.title === item.group);
        if (!group) {
          group = { title: item.group, color: groupColors[groups.length % groupColors.length], items: [] };
          groups.push(group);
        }
        group.items.push(item);
      });

      groups.forEach(group => {
        const heading = document.createElement('h3');
        heading.className = 'group-title';
        heading.style.color = `var(--accent-${group.color})`;
        heading.textContent = group.title;

        const grid = document.createElement('div');
        grid.className = 'card-grid';
        group.items.forEach(item => grid.appendChild(createCardEl(item, group.color)));

        containerEl.appendChild(heading);
        containerEl.appendChild(grid);
      });
    }

    renderGrouped(introListEl, introQuestions);
    renderGrouped(jsListEl, jsQuestions);
    renderGrouped(reactListEl, reactQuestions);

    const tabButtons = document.querySelectorAll('.tab-btn[data-tab]');
    const tabPanels = document.querySelectorAll('.tab-panel');
    const placeholderButtons = document.querySelectorAll('.tab-btn.placeholder');
    const toastEl = document.getElementById('toast');
    let toastTimer;

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        tabButtons.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    placeholderButtons.forEach(btn => {
      btn.addEventListener('click', () => showToast('Coming soon'));
    });
  </script>
