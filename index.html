<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript and React Interview Questions</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg">
    <main class="app-shell glass">
      <div class="topbar">
        <div class="title">
          <h1>JavaScript & React Interview Q&A</h1>
          <p class="muted">Handy reference — two tabs, light/dark, glass UI</p>
        </div>
        <div class="actions">
          <div class="theme-toggle">
            <label class="switch">
              <input id="themeCheckbox" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="js" role="tab" aria-selected="true">JavaScript</button>
        <button class="tab" data-tab="react" role="tab">React</button>
      </nav>

      <section id="content" class="content">
        <div id="faqRoot" class="faq-list"></div>
      </section>

      <footer class="footer muted">Press a question to expand — answers optimized for interview conversation.</footer>
    </main>
  </div>

  <script>
    // Questions split into two tabs
    const jsQuestions = [
      { q: 'Introduction — how to present yourself', a: 'Briefly state your name, role, experience, and key strengths — frontend focus, React, Redux, REST APIs, and performance optimizations.' },
      { q: 'Arrow functions', a: 'Shorter function syntax with lexical `this`. Used in components, event handlers, and callbacks.' },
      { q: 'Template literals', a: 'Backticks with ${} for interpolation, cleaner than string concatenation.' },
      { q: 'Destructuring assignment', a: 'Extract values from objects/arrays into variables; commonly used with props and API responses.' },
      { q: 'Spread & Rest operators', a: 'Spread copies arrays/objects; rest collects remaining args. Used for immutable updates and flexible params.' },
      { q: 'Optional chaining', a: 'Safely access nested properties with ?., preventing runtime errors when values are null/undefined.' },
      { q: 'Nullish coalescing', a: 'Use ?? to provide defaults only for null or undefined, preserving 0/false/"" values.' },
      { q: 'Common array methods', a: 'map, filter, find, reduce, sort are used for rendering, filtering, aggregations, and sorting data.' },
      { q: 'Promises, async/await', a: 'Promises represent async tasks. Use async/await for readable asynchronous code and try/catch for errors.' },
      { q: 'try/catch', a: 'Wrap async calls in try/catch to handle errors gracefully (e.g., API failures).' },
      { q: 'Closure', a: 'A function that remembers variables from its outer scope — useful for factories and callbacks.' },
      { q: 'Event Loop', a: 'JavaScript runtime mechanism that processes callbacks and microtasks without blocking the UI.' },
      { q: 'Debouncing vs Throttling', a: 'Debounce waits until input stops; throttle limits frequency. Use for search and high-frequency events respectively.' },
      { q: 'setTimeout & setInterval', a: 'Timers for delayed or repeated execution; clear them during cleanup to avoid leaks.' },
      { q: 'Event handling', a: 'React uses synthetic events (onClick, onChange). Keep handlers stable with useCallback when needed.' },
      { q: 'DOM access', a: 'Prefer refs (useRef) in React. Use direct DOM only when necessary: file download, canvas, dynamic script loading.' },
      { q: 'ES6 Modules', a: 'Use import/export to split code into reusable modules.' },
      { q: 'Default vs Named exports', a: 'Default for main export; named for multiple utilities.' },
      { q: 'Higher-order & first-class functions', a: 'Functions as values enable map/filter and HOF utilities; React.memo is HOF-based.' },
      { q: 'Lexical scope & this', a: 'Lexical scope determines variable access; arrow functions inherit surrounding this.' },
      { q: 'JSON & Data fetching', a: 'APIs exchange JSON. Use fetch/Axios to request data and parse JSON responses.' },
      { q: 'Shallow vs Deep copy', a: 'Spread/operator makes shallow copies; deep copy needs structuredClone or custom logic.' },
      { q: 'Short-circuit & Ternary', a: 'Use &&, || and ?? for concise conditional values and ?: for inline if-else in JSX.' }
    ];

    const reactQuestions = [
      { q: 'Project overview (Micro Frontend with Single-SPA)', a: 'Shell loads microfrontends via Single-SPA. Each micro app (VM, Admin, Reports) mounts independently and uses React + Redux for UI and state.' },
      { q: 'React components used', a: 'Reusable components: CustomButton, CustomTextField, ReusableTable, Header, Sidebar — improves consistency and reduces duplication.' },
      { q: 'React Hooks', a: 'useState, useEffect, useMemo, useCallback, useRef used across components; custom hooks like useLocalStorage and useConfig encapsulate logic.' },
      { q: 'Context API', a: 'Used for app-level config such as theme and global settings to avoid prop drilling.' },
      { q: 'Redux & Flow', a: 'Action → Thunk → Axios API → Reducer → Store → UI (useSelector). Redux Persist keeps selected state across refresh.' },
      { q: 'Redux Persist', a: 'Persists parts of the Redux store (localStorage) so selected values survive page reloads.' },
      { q: 'Axios & Interceptors', a: 'Axios handles REST calls; interceptors attach JWT tokens and handle 401 globally.' },
      { q: 'Authentication', a: 'Keycloak issues JWTs stored in localStorage; backend validates tokens and enforces RBAC.' },
      { q: 'Routing', a: 'react-router-dom for BrowserRouter, nested routes, dynamic params, protected routes and lazy loading where applicable.' },
      { q: 'Error Boundary', a: 'Class-based component to catch runtime errors and display fallback UI for module isolation.' },
      { q: 'Lazy loading & Code splitting', a: 'Use React.lazy and Suspense to split internal modules and reduce initial bundle size.' },
      { q: 'Material UI Theme', a: 'Centralized theme (palette, typography) with ThemeProvider for consistent styling and light/dark modes.' },
      { q: 'Internationalization', a: 'i18next + react-i18next with resource files for multiple languages and t() usage.' },
      { q: 'Performance', a: 'useMemo, useCallback, React.memo, pagination and avoiding duplicate API calls improve responsiveness.' },
      { q: 'Testing', a: 'Jest + React Testing Library; mock API calls and test user interactions and component rendering.' },
      { q: 'DevOps / CI', a: 'CI builds production assets; static deploys (Vercel) or multi-stage Docker + Nginx for production.' }
    ];

    // Render helpers
    const root = document.getElementById('faqRoot');
    function createItem(item) {
      const wrap = document.createElement('div');
      wrap.className = 'faq-item';

      const q = document.createElement('button');
      q.className = 'faq-question';
      q.type = 'button';
      q.innerHTML = `<span class="qtext">${item.q}</span><span class="icon">+</span>`;

      const a = document.createElement('div');
      a.className = 'faq-answer';
      a.innerHTML = `<p>${item.a}</p>`;

      q.addEventListener('click', () => {
        wrap.classList.toggle('active');
      });

      wrap.appendChild(q);
      wrap.appendChild(a);
      return wrap;
    }

    function loadList(list) {
      root.innerHTML = '';
      list.forEach((it) => root.appendChild(createItem(it)));
    }

    // Tab handling
    const tabs = document.querySelectorAll('.tab');
    function setActiveTab(name) {
      tabs.forEach(t => {
        const is = t.dataset.tab === name;
        t.classList.toggle('active', is);
        t.setAttribute('aria-selected', is ? 'true' : 'false');
      });
      if (name === 'react') loadList(reactQuestions);
      else loadList(jsQuestions);
      localStorage.setItem('iq_tab', name);
    }

    tabs.forEach(t => t.addEventListener('click', () => setActiveTab(t.dataset.tab)));

    // Theme toggle
    const themeCheckbox = document.getElementById('themeCheckbox');
    function setTheme(mode) {
      document.documentElement.setAttribute('data-theme', mode);
      themeCheckbox.checked = mode === 'dark';
      localStorage.setItem('iq_theme', mode);
    }
    themeCheckbox.addEventListener('change', () => setTheme(themeCheckbox.checked ? 'dark' : 'light'));

    // Initialize
    const savedTab = localStorage.getItem('iq_tab') || 'js';
    const savedTheme = localStorage.getItem('iq_theme') || 'light';
    setTheme(savedTheme);
    setActiveTab(savedTab);
  </script>
</body>
</html>
